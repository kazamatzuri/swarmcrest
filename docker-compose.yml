services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      - ./backend/src:/app/backend/src
      - ./backend/tests:/app/backend/tests
      - ./backend/Cargo.toml:/app/backend/Cargo.toml
      - ./backend/Cargo.lock:/app/backend/Cargo.lock
      - ./orig_game:/app/orig_game
      - ./docs:/app/docs
      - backend-target:/app/backend/target
      - ./data/maps:/app/data/maps
    environment:
      - RUST_LOG=info
      - DATABASE_URL=postgres://${POSTGRES_USER:-infon}:${POSTGRES_PASSWORD:-infon}@postgres:5432/${POSTGRES_DB:-infon}
      - INFON_LOCAL_MODE=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - infon-net

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend/src:/app/frontend/src
      - ./frontend/public:/app/frontend/public
      - ./frontend/index.html:/app/frontend/index.html
      - ./frontend/vite.config.ts:/app/frontend/vite.config.ts
      - ./frontend/tsconfig.json:/app/frontend/tsconfig.json
      - ./frontend/tsconfig.app.json:/app/frontend/tsconfig.app.json
      - ./frontend/tsconfig.node.json:/app/frontend/tsconfig.node.json
      - ./frontend/eslint.config.js:/app/frontend/eslint.config.js
    environment:
      - VITE_API_URL=http://backend:3000
    depends_on:
      - backend
    networks:
      - infon-net

  prometheus:
    image: prom/prometheus:latest
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    depends_on:
      - backend
    networks:
      - infon-net

  grafana:
    image: grafana/grafana:latest
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus
    networks:
      - infon-net

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-infon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-infon}
      POSTGRES_DB: ${POSTGRES_DB:-infon}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - infon-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-infon}"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  # Named volume for Rust target dir -- avoids slow rebuilds from scratch
  backend-target:
  # Named volume for PostgreSQL data persistence
  postgres-data:

networks:
  infon-net:
    driver: bridge
