# SwarmCrest reverse proxy config for nginx.
# Copy to /etc/nginx/sites-available/ and symlink to sites-enabled/.
#
# TLS setup:
#   certbot --nginx -d swarmcrest.submerged-intelligence.de

server {
    listen 80;
    server_name swarmcrest.submerged-intelligence.de;

    # Let's Encrypt ACME challenges must be served before any redirect
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name swarmcrest.submerged-intelligence.de;

    # Certbot will fill these in:
    # ssl_certificate     /etc/letsencrypt/live/swarmcrest.submerged-intelligence.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/swarmcrest.submerged-intelligence.de/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed for future real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
