# SwarmCrest reverse proxy config for nginx.
#
# This is the initial HTTP-only config. Run certbot to add TLS:
#   certbot --nginx -d swarmcrest.submerged-intelligence.de
#
# Certbot will automatically:
#   - Add the SSL server block
#   - Add redirect from HTTP to HTTPS
#   - Manage certificate renewal

server {
    listen 80;
    server_name swarmcrest.submerged-intelligence.de;

    # ACME challenges served from disk (certbot + renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (if needed for future real-time features)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
