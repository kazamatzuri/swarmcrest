# SwarmCrest reverse proxy config for nginx.
#
# Certbot-managed TLS config for swarmcrest.submerged-intelligence.de
# Certificate renewal is handled automatically by certbot.

server {
    server_name swarmcrest.submerged-intelligence.de;

    # ACME challenges served from disk (certbot + renewal)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Content-Security-Policy: allow scripts/styles/media served by the app
    add_header Content-Security-Policy
        "default-src 'self'; script-src 'self'; script-src-elem 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; media-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; worker-src 'self' blob:; frame-ancestors 'none'"
        always;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/swarmcrest.submerged-intelligence.de/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/swarmcrest.submerged-intelligence.de/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}


server {
    if ($host = swarmcrest.submerged-intelligence.de) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name swarmcrest.submerged-intelligence.de;
    return 404; # managed by Certbot
}
